name: Poke
on:
  schedule:
    # Dropped to every 5 minutes. Even if GitHub delays the run by 5-8 minutes, 
    # it will still trigger before Render's 15-minute sleep timer hits.
    - cron: '*/5 1-9 * * *'
jobs:
  ping:
    runs-on: ubuntu-latest
    concurrency:
      group: wake-render
      cancel-in-progress: true
    steps:
      - name: Force Wake with Cache Buster
        # Appending a dynamic timestamp tricks Render into thinking this is a brand new page request,
        # forcing it to bypass the CDN cache and actually spin up the server.
        run: |
          TIMESTAMP=$(date +%s)
          curl -L --max-time 120 --silent --show-error "https://shelf-space.onrender.com/?ping=${TIMESTAMP}"
