name: Poke
on:
  schedule:
    # Every 10 minutes between 08:00–16:59 Hanoi (UTC+7). GitHub Actions uses UTC.
    - cron: '*/10 1-9 * * *'
jobs:
  ping:
    runs-on: ubuntu-latest
    concurrency:
      group: wake-render
      cancel-in-progress: true
    steps:
      - name: Force Wake
        # Follow redirects and allow up to 120s for Render to boot
        run: curl -L --max-time 120 --silent --show-error https://shelf-space.onrender.com/
