name: Daily App Wakeup
on:
  schedule:
    # Runs every 15 minutes, 0:00 UTC to 11:45 UTC 
    # (7:00 AM to 6:45 PM Hanoi Time), Every Day
    - cron: '*/15 0-11 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Poke Render
        run: |
          # 60s timeout to handle the cold start boot time
          curl -sS --connect-timeout 60 https://shelf-space.onrender.com/ || \
          (sleep 30 && curl -sS --connect-timeout 60 https://shelf-space.onrender.com/)
